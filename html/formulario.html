<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./../CSS/formulario.css">
    <link rel="stylesheet" href="../CSS/header.css">
    <title>Formulário de Orçamento</title>

</head>

<body class="temaSite">

<header class="header">
        <div class="container nav-container">
        <div class="logo"> 
            <img src="../Imagens/LogoPEAR.png" alt="loguinho">
        </div>

        <nav>
            <ul class="menu">
                <li><a href="#">Quem Somos</a></li>
                <li><a href="#">Serviços</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>

        <div class="language-selector">
            <img src="../Imagens/brasil.png" class="flag">
            <span class="arrow">▾</span>
            </div>
    </header>



    <div class="boxFormulario">

        <form>
            <span class="p">Nome</span>
            <span class="p">Empresa</span>

            <div><input type="text" class="boxLinhas" placeholder="Nome">
                <input type="text" class="boxLinhas" placeholder="Empresa">
            </div>
            <span class="p">Email</span>
            <span class="p">Departamento</span>
            <div>
                <input type="text" class="boxLinhas" placeholder="Email">
                <input type="text" class="boxLinhas" Placeholder="Departamento">
            </div>
            <span class="p">Fone</span>
            <span class="p">Segmento</span>
            <div>
                <input type="text" class="boxLinhas" placeholder="Fone">
                <input type="text" class="boxLinhas" placeholder="Segmento">
            </div>


            <span class="p">Descrição de orçamento</span>
            <div><input type="text" class="boxLinha3"></div>
            <div><input type="submit" class="boxBotao">
            </div>


        </form>
    </div>








</body>
